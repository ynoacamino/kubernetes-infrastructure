helmDefaults:
  wait: true
  timeout: 600
  createNamespace: true
  atomic: true

repositories:
  - name: jetstack
    url: https://charts.jetstack.io

releases:
  - name: cert-manager
    namespace: cert-manager
    createNamespace: true
    chart: jetstack/cert-manager
    version: v1.20.0
    values:
      - helm/cert-manager/values.yaml
