nameOverride: "monitoring"
namespaceOverride: "monitoring"

windowsMonitoring:
  enabled: false

kubeStateMetrics:
  enabled: false

defaultRules:
  create: false

kubeEtcd:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false

alertmanager:
  enabled: false

kubeApiServer:
  enabled: false

kubelet:
  enabled: false

coreDns:
  enabled: false

grafana:
  enabled: true
  defaultDashboardsEnabled: false
  service:
    type: ClusterIP
  persistence:
    enabled: true
    existingClaim: grafana-pvc
  securityContext:
    fsGroup: 472
  resources:
    requests:
      cpu: 80m
      memory: 100Mi
    limits:
      cpu: 100m
      memory: 200Mi

prometheus:
  enabled: true
  prometheusSpec:
    replicas: 1
    retention: 12h
    scrapeInterval: 30s
    additionalArgs:
      - name: web.enable-lifecycle
        value: ""
    maximumStartupDurationSeconds: 300
    resources:
      requests:
        cpu: 80m
        memory: 100Mi
      limits:
        cpu: 100m
        memory: 280Mi
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi

prometheus-node-exporter:
  enabled: true
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 64Mi
  extraArgs:
    - --no-collector.filesystem
    - --no-collector.netdev
    - --no-collector.mdadm
    - --no-collector.bonding
    - --no-collector.hwmon
    - --no-collector.ipvs
    - --no-collector.nfs
    - --no-collector.sockstat
    - --no-collector.timex
  kubeRBACProxy:
    enabled: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
  serviceMonitor:
    interval: 30s
    relabelings:
      - sourceLabels: [__meta_kubernetes_pod_node_name]
        targetLabel: node
  nodeSelector: {}
  tolerations: []
  affinity: {}
