apiVersion: v1
kind: LimitRange

metadata:
  name: prod-limit-range
  namespace: prod

spec:
  limits:
    - type: Container
      default:
        cpu: 400m
        memory: 512Mi
      defaultRequest:
        cpu: 200m
        memory: 256Mi
      max:
        cpu: "1"
        memory: 1Gi
      min:
        cpu: 100m
        memory: 128Mi
